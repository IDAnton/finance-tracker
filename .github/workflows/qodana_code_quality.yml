name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Проверка кодовой базы (Checkout)
        uses: actions/checkout@v4

      - name: Настройка Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Компиляция и запуск всех тестов (Unit + Integration)
        run: ./mvnw clean test
