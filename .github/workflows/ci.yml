name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Настройка Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Тестирование
        run: ./mvnw clean test

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cборка Docker образа Spring приложения
        uses: docker/build-push-action@v5

        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: finance-tracker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max